data:
  test_index: data/processed/intent_hdf5/test.h5
  val_index: data/processed/intent_hdf5/val.h5
  batch_size: 64
  num_workers: 0

human_model:
  config: configs/human_intent_transformer.yaml
  checkpoint: checkpoints/human_intent_transformer/best.pt

machine_policy:
  future_len: 125
  frame_rate: 25.0
  lane_width_m: 3.5
  wheelbase_m: 2.7
  target_speed_mps: 31.0

trust:
  frame_rate: 25.0
  future_len: 125
  wheelbase_m: 2.7
  safe_clearance_m: 4.0
  safe_ttc_s: 4.0
  safe_dhw_m: 15.0
  decay_eta: 0.035
  human_risk_bias: 2.4
  human_risk_gain: 4.0
  disagreement_bias: 2.3
  disagreement_gain: 3.2

authority:
  uncertainty_scale: 0.35
  conservative_kappa: 0.55
  smooth_beta: 0.55
  context_gain: 1.2
  context_smooth_boost: 0.30

evaluation:
  seed: 2026
  device: auto
  split: test
  max_batches: 8
  output_dir: outputs/work3_authority
