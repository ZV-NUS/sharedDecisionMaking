  frame_rate: 25.0
  lane_width_m: 3.5
  wheelbase_m: 2.7
  max_abs_steer_rad: 0.45
  max_accel_mps2: 1.5
  comfortable_decel_mps2: 2.5
  target_speed_mps: 31.0
  min_speed_mps: 1.0
  desired_time_headway_s: 1.4
  min_front_gap_m: 18.0
  min_rear_gap_m: 15.0
