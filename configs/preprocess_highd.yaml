raw_data_dir: data
output_dir: data/processed
output_name: highd_base_samples.npz
save_per_recording: true

# Empty list means all available recordings found under raw_data_dir.
recordings: []

sampling:
  frame_rate: 25
  history_seconds: 3.0
  future_seconds: 5.0
  # 1 means every valid anchor frame becomes one sample.
  stride_frames: 1
  max_samples_per_recording: null

coordinate:
  # Normalize all samples to ego-centric traffic coordinates:
  # +x points to the ego vehicle's driving direction, +y points to the left.
  normalize_driving_direction: true

vehicle_filter:
  keep_classes: ["Car"]
  # highD stores the vehicle longitudinal size in the `width` column and
  # lateral size in the `height` column.
  length_column: width
  width_column: height
  min_length_m: 3.5
  max_length_m: 5.5
  min_width_m: 1.5
  max_width_m: 2.4

steering:
  wheelbase_ratio: 0.60
  min_speed_mps: 1.0
  max_abs_steer_rad: 0.70
  smooth_window: 9
  smooth_polyorder: 2

risk:
  sigma_distance_m: 35.0
  alpha_delta_v: 0.05
  ttc_cap_s: 20.0

neighbors:
  slots:
    - precedingId
    - followingId
    - leftPrecedingId
    - leftFollowingId
    - rightPrecedingId
    - rightFollowingId
