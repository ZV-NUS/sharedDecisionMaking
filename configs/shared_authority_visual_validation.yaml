rl_config: configs/rl_authority.yaml

data:
  h5_path: data/processed/intent_hdf5/test.h5

environment:
  frame_rate: 25.0
  future_len: 125
  lane_width_m: 3.5
  wheelbase_m: 2.7
  ego_length_m: 4.6
  ego_width_m: 1.8
  collision_longitudinal_margin_m: 1.0
  collision_lateral_margin_m: 0.4

controller:
  frame_rate: 25.0
  future_len: 125
  horizon: 12
  wheelbase_m: 2.7
  lane_width_m: 3.5
  lane_margin_m: 0.5
  ego_length_m: 4.6
  ego_width_m: 1.8
  max_abs_steer_rad: 0.45
  max_abs_accel_mps2: 4.0
  max_steer_rate_radps: 0.55
  max_jerk_mps3: 10.0
  beta_limit_rad: 0.12
  yaw_rate_limit_rps: 0.65
  target_speed_mps: 31.0
  safe_distance_m: 8.0
  robust_distance_gain_m: 5.0
  lane_center_weight: 3.2
  lane_boundary_weight: 5000.0
  lane_change_threshold_m: 1.4

selection:
  num_cases: 6
  scan_limit: 1200
  min_reference_risk: 0.02
  seed: 2026
  mode: fixed_validation_scenarios

output:
  dir: outputs/shared_authority_validation
